<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a16">
<title>BRAINROT ⚡</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a16;--bg2:#11112a;--bg3:#181840;
  --sf:rgba(20,20,50,.9);--sf2:rgba(30,30,60,.8);
  --bd:rgba(255,255,255,.06);--bd2:rgba(255,255,255,.14);
  --tx:#ededf8;--tx2:#8888aa;--dm:#3d3d60;
  --pk:#ff2d6a;--bl:#5b8cff;--cy:#00dda8;--yl:#ffc640;--pr:#a75fff;--or:#ff7b3a;--rd:#ff4040;--gn:#30d880;
  --g1:linear-gradient(135deg,#ff2d6a,#a75fff);--g2:linear-gradient(135deg,#5b8cff,#00dda8);--g3:linear-gradient(135deg,#ff7b3a,#ffc640);
  --ff:'Plus Jakarta Sans',sans-serif;--fm:'DM Mono',monospace;
}
body{background:var(--bg);color:var(--tx);font-family:var(--ff);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
.bgfx{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:.1;animation:drift 25s ease-in-out infinite}
.orb:nth-child(1){width:500px;height:500px;background:#ff2d6a;top:-150px;left:-150px}
.orb:nth-child(2){width:400px;height:400px;background:#5b8cff;bottom:-100px;right:-100px;animation-delay:-10s}
.orb:nth-child(3){width:350px;height:350px;background:#a75fff;top:40%;left:40%;animation-delay:-18s}
@keyframes drift{0%,100%{transform:translate(0,0)}33%{transform:translate(50px,-40px)}66%{transform:translate(-30px,50px)}}

.app{max-width:680px;margin:0 auto;padding:16px;min-height:100vh;position:relative;z-index:1}
@media(min-width:720px){.app{padding:24px 40px}}

.scr{display:none;flex-direction:column;gap:14px;animation:pop .25s ease}
.scr.on{display:flex}
@keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* COMMON */
.cd{background:var(--sf);backdrop-filter:blur(20px);border:1px solid var(--bd);border-radius:18px;padding:18px}
.lbl{font-size:.6rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--tx2);margin-bottom:8px}
.inp{width:100%;background:var(--bg2);border:2px solid var(--bd2);color:var(--tx);font-family:var(--ff);font-size:1rem;padding:14px 16px;border-radius:14px;outline:none;transition:border .15s}
.inp:focus{border-color:var(--bl);box-shadow:0 0 0 4px rgba(91,140,255,.12)}
.inp::placeholder{color:var(--dm)}
.inp-code{font-family:var(--fm);font-size:1.6rem;text-align:center;letter-spacing:10px;text-transform:uppercase}
.sel{width:100%;background:var(--bg2);border:2px solid var(--bd2);color:var(--tx);font-family:var(--ff);font-size:.88rem;padding:12px 14px;border-radius:12px;outline:none;appearance:none}
.btn{padding:16px 24px;border-radius:14px;border:none;font-family:var(--ff);font-size:.88rem;font-weight:700;cursor:pointer;transition:all .12s;width:100%;text-transform:uppercase;letter-spacing:.02em}
.btn:active{transform:scale(.97)}
.btn-pk{background:var(--g1);color:#fff;box-shadow:0 6px 24px rgba(255,45,106,.2)}
.btn-bl{background:var(--g2);color:#fff;box-shadow:0 6px 24px rgba(91,140,255,.2)}
.btn-or{background:var(--g3);color:#111;box-shadow:0 6px 24px rgba(255,123,58,.2)}
.btn-gh{background:transparent;border:2px solid var(--bd2);color:var(--tx2)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.btn-r{display:flex;gap:8px}.btn-r .btn{flex:1}
.btn-s{padding:11px 16px;font-size:.75rem}
.back{background:none;border:none;color:var(--tx2);font-family:var(--ff);font-size:.82rem;font-weight:600;cursor:pointer;padding:6px 0;display:flex;align-items:center;gap:4px}
.back:hover{color:var(--tx)}
.back::before{content:'←'}

/* AVATAR */
.av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid rgba(255,255,255,.1);box-shadow:0 4px 16px rgba(0,0,0,.35)}
.av-m{width:54px;height:54px;font-size:1.6rem}.av-l{width:80px;height:80px;font-size:2.6rem;border-width:3px}.av-s{width:34px;height:34px;font-size:1rem;border-width:1.5px}

/* MODES */
.modes{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mode{background:var(--sf);border:1px solid var(--bd);border-radius:18px;padding:20px 14px;cursor:pointer;transition:all .2s;text-align:center;position:relative;overflow:hidden}
.mode::after{content:'';position:absolute;inset:0;border-radius:18px;opacity:0;transition:opacity .2s}
.mode:nth-child(1)::after{background:var(--g1)}.mode:nth-child(2)::after{background:var(--g2)}.mode:nth-child(3)::after{background:var(--g3)}.mode:nth-child(4)::after{background:var(--g4)}
.mode:hover::after,.mode:active::after{opacity:.1}
.mode:active{transform:scale(.96)}
.mode>*{position:relative;z-index:1}
.mi{font-size:2.4rem;margin-bottom:8px;display:block}
.mn{font-weight:800;font-size:.82rem;letter-spacing:.02em}
.md{font-size:.62rem;color:var(--tx2);margin-top:3px;line-height:1.4}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:8px 13px;border-radius:10px;border:1.5px solid var(--bd2);background:transparent;color:var(--tx2);font-family:var(--ff);font-size:.72rem;font-weight:600;cursor:pointer;transition:all .12s}
.chip.on{background:var(--bl);border-color:var(--bl);color:#fff}
.chip:active{transform:scale(.95)}

/* DIFF */
.diffs{display:flex;gap:6px}
.df{flex:1;padding:11px;border-radius:10px;border:2px solid var(--bd2);background:transparent;color:var(--tx2);font-family:var(--ff);font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;text-align:center;transition:all .12s}
.df.on{color:#fff}
.df.ez.on{background:var(--gn);border-color:var(--gn)}.df.md.on{background:var(--yl);border-color:var(--yl);color:#111}.df.hd.on{background:var(--rd);border-color:var(--rd)}

/* GAME UI */
.gbar{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
.gbar-l{display:flex;align-items:center;gap:8px}
.gbar-r{display:flex;align-items:center;gap:8px}
.gbtn{width:34px;height:34px;border-radius:10px;border:1px solid var(--bd2);background:transparent;color:var(--tx2);font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.gbtn:hover{border-color:var(--rd);color:var(--rd)}
.tbar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin:6px 0}
.tf{height:100%;border-radius:2px;transition:width .4s linear}
.tf-ok{background:var(--g2)}.tf-warn{background:var(--rd)}

.qcard{background:var(--sf);backdrop-filter:blur(20px);border:1px solid var(--bd);border-radius:18px;padding:24px;text-align:center}
.qnum{font-family:var(--fm);font-size:.65rem;font-weight:500;color:var(--tx2);letter-spacing:.08em}
.qtxt{font-size:clamp(1.05rem,3vw,1.3rem);font-weight:700;line-height:1.45;margin:14px 0 18px}
.ans-row{display:flex;gap:8px}
.ans-inp{flex:1;background:var(--bg2);border:2px solid var(--bd2);color:var(--tx);font-family:var(--ff);font-size:1.1rem;font-weight:600;padding:16px;border-radius:14px;outline:none;text-align:center}
.ans-inp:focus{border-color:var(--cy)}
.ans-btn{width:56px;border-radius:14px;border:none;font-size:1.2rem;cursor:pointer;transition:all .12s}
.ans-btn:active{transform:scale(.95)}
.ans-pk{background:var(--g1);color:#fff}
.skip-btn{margin-top:8px;background:none;border:none;color:var(--dm);font-family:var(--ff);font-size:.75rem;font-weight:600;cursor:pointer;padding:8px}
.skip-btn:hover{color:var(--tx2)}

.score-pill{font-family:var(--fm);font-size:.9rem;font-weight:500;color:var(--cy);display:flex;align-items:center;gap:4px}
.streak-badge{background:var(--or);color:#fff;font-size:.6rem;font-weight:700;padding:2px 6px;border-radius:6px;margin-left:4px}

/* FEEDBACK */
.fb-wrap{text-align:center;padding:12px 0;animation:pop .2s ease}
.fb-icon{font-size:2rem;margin-bottom:4px}
.fb-answer{font-size:1rem;font-weight:700;margin-top:4px}
.fb-ok .fb-answer{color:var(--gn)}.fb-no .fb-answer{color:var(--rd)}

/* RESULTS */
.res{background:var(--sf);backdrop-filter:blur(20px);border:1px solid var(--bd);border-radius:20px;padding:28px;text-align:center}
.res-i{font-size:3rem;margin-bottom:8px}
.res-t{font-weight:800;font-size:clamp(1.3rem,4vw,1.8rem);margin-bottom:4px}
.res-sc{font-family:var(--fm);font-size:clamp(2rem,7vw,3rem);font-weight:500;color:var(--cy);margin:8px 0}
.res-sub{font-size:.75rem;color:var(--tx2);margin-bottom:18px}

/* STATS */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sb{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:16px;text-align:center}
.sv{font-family:var(--fm);font-size:1.8rem;font-weight:500;line-height:1}
.sl{font-size:.55rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--tx2);margin-top:5px}

/* GUESS */
.clue-c{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:14px;text-align:center;margin-bottom:6px}
.clue-n{font-size:.55rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2);margin-bottom:4px}
.clue-t{font-size:1rem;font-weight:600;line-height:1.4}
.strikes{display:flex;gap:8px;justify-content:center;margin:8px 0}
.stk{width:26px;height:26px;border-radius:50%;border:2px solid var(--dm);font-size:.75rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.stk.x{border-color:var(--rd);color:var(--rd);background:rgba(255,64,64,.1)}

/* NAME 10 */
.n10-title{font-weight:800;font-size:1.1rem;text-align:center}
.n10-timer{font-family:var(--fm);font-size:3.5rem;font-weight:500;text-align:center;line-height:1;margin:4px 0}
.n10-cnt{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2);text-align:center}
.n10-list{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:10px 0}
.n10-ok{padding:7px 13px;border-radius:10px;background:rgba(0,221,168,.1);border:1px solid rgba(0,221,168,.2);color:var(--cy);font-size:.82rem;font-weight:600}
.n10-no{padding:7px 13px;border-radius:10px;background:rgba(255,64,64,.1);border:1px solid rgba(255,64,64,.2);color:var(--rd);font-size:.82rem;font-weight:600;text-decoration:line-through}

/* MP */
.room-c{font-family:var(--fm);font-size:clamp(2rem,9vw,3rem);text-align:center;letter-spacing:10px;padding:16px;background:var(--bg2);border-radius:16px;border:2px dashed var(--dm);cursor:pointer;color:var(--cy)}
.plist{display:flex;flex-direction:column;gap:6px}
.pr{display:flex;align-items:center;gap:10px;background:var(--bg2);border-radius:12px;padding:10px 14px;border:1px solid var(--bd)}
.pr-n{font-weight:700;font-size:.9rem;flex:1}
.tag{font-size:.5rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border-radius:6px}
.scs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.sc{background:var(--sf);border:2px solid var(--bd);border-radius:12px;padding:8px 12px;text-align:center;flex:1;min-width:65px;transition:all .2s;position:relative}
.sc.on{transform:translateY(-2px)}
.sc-nm{font-size:.5rem;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.sc-pt{font-family:var(--fm);font-size:1.4rem;line-height:1}
.wait{text-align:center;color:var(--tx2);padding:20px;font-size:.85rem}
.dots{display:inline-flex;gap:3px;margin-top:6px}
.dot{width:5px;height:5px;background:var(--cy);border-radius:50%;animation:db 1.2s ease infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes db{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}
.hint{text-align:center;color:var(--tx2);font-size:.7rem;margin-top:4px}
.error{background:rgba(255,64,64,.08);border:1px solid rgba(255,64,64,.2);color:var(--rd);padding:10px 14px;border-radius:10px;font-size:.8rem;text-align:center}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--cy);color:var(--bg);padding:10px 24px;border-radius:12px;font-weight:700;font-size:.82rem;z-index:200;animation:ti .3s,to .3s 1.5s forwards}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes to{to{opacity:0;transform:translateX(-50%) translateY(16px)}}
</style>
</head>
<body>
<div class="bgfx"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
<div class="app" id="app"></div>

<script>
/* ========== CONFIG ========== */
const FACES=['😎','🤓','😤','🥶','🔥','💀','👻','🤖','🦊','🐱','🦁','🐸','🎃','👽','🧠','💎','⚡','🌙','🦋','🐙','🍕','🎯','🎲','🎭'];
const AVB=['linear-gradient(135deg,#ff2d6a,#a75fff)','linear-gradient(135deg,#5b8cff,#00dda8)','linear-gradient(135deg,#ff7b3a,#ffc640)','linear-gradient(135deg,#a75fff,#5b8cff)','linear-gradient(135deg,#ff4040,#ff7b3a)','linear-gradient(135deg,#00dda8,#5b8cff)','linear-gradient(135deg,#ffc640,#ff2d6a)','linear-gradient(135deg,#30d880,#00dda8)'];
const rAv=()=>({f:FACES[Math.floor(Math.random()*FACES.length)],b:AVB[Math.floor(Math.random()*AVB.length)]});

const CATS=['Mixed','General Knowledge','Geography','Science','History','Pop Culture','Animals','Food & Drink','Sports','Movies & TV','Music','Art & Literature','Technology','Space','Human Body','Languages','Finance','World Flags','World Capitals','Landmarks','Math','Fashion','Psychology','Mythology','Nature','Cars & Transport'];

/* ========== STATE ========== */
let me={id:'u'+Math.random().toString(36).substr(2,8),name:'',lang:'english',av:rAv(),games:0,wins:0,correct:0,total:0};
let gState={};

/* ========== STORAGE ========== */
const LS={
  get(k){const v=localStorage.getItem(k);return v?JSON.parse(v):null;},
  set(k,v){localStorage.setItem(k,JSON.stringify(v));}
};

function loadMe(){const d=LS.get('br-me');if(d){me={...me,...d};return true;}return false;}
function saveMe(){LS.set('br-me',{id:me.id,name:me.name,lang:me.lang,av:me.av,games:me.games,wins:me.wins,correct:me.correct,total:me.total});}

/* ========== RENDER ENGINE ========== */
const $=id=>document.getElementById(id);
const app=$('app');
function render(html){app.innerHTML=html;app.className='scr on';}

/* ========== SCREENS ========== */

function authScreen(){
  render(`
    <div style="text-align:center;padding:32px 0 12px">
      <div style="font-size:3rem;margin-bottom:6px">🧠</div>
      <div style="font-weight:800;font-size:clamp(2.2rem,9vw,3.2rem);letter-spacing:.04em;background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1">BRAINROT</div>
      <div style="font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--tx2);margin-top:4px">the cure is knowledge</div>
    </div>
    <div class="cd">
      <div class="lbl">Your name</div>
      <input class="inp" id="aName" type="text" placeholder="Enter name..." maxlength="12">
      <div class="lbl" style="margin-top:12px">Language</div>
      <select class="sel" id="aLang"><option value="english">🇬🇧 English</option><option value="french">🇫🇷 Français</option><option value="arabic">🇲🇦 العربية</option></select>
    </div>
    <button class="btn btn-pk" onclick="doAuth()">Enter 🧠</button>
    <div id="aErr"></div>`);
}

function doAuth(){
  const n=$('aName').value.trim();
  if(!n){$('aErr').innerHTML='<div class="error">Enter a name</div>';return;}
  me.name=n;me.lang=$('aLang').value;me.av=rAv();saveMe();homeScreen();
}

function homeScreen(){
  const pct=me.total>0?Math.round(me.correct/me.total*100):0;
  render(`
    <div style="display:flex;align-items:center;gap:12px;padding:8px 0 16px">
      <div class="av av-m" style="background:${me.av.b}">${me.av.f}</div>
      <div style="flex:1"><div style="font-weight:800;font-size:1rem">${me.name}</div><div style="font-size:.65rem;color:var(--tx2)">${me.games>0?me.games+' games · '+pct+'% accuracy':'Ready to play'}</div></div>
      <button class="gbtn" onclick="statsScreen()" title="Stats">📊</button>
    </div>
    <div class="modes">
      <div class="mode" onclick="triviaSetup()"><span class="mi">⚡</span><div class="mn">Trivia</div><div class="md">Type your answer · 25+ categories</div></div>
      <div class="mode" onclick="guessSetup()"><span class="mi">🔍</span><div class="mn">Guess It</div><div class="md">Clues & deduction · 3 strikes</div></div>
      <div class="mode" onclick="n10Setup()"><span class="mi">🔟</span><div class="mn">Name 10</div><div class="md">Beat the clock · validated</div></div>
      <div class="mode" onclick="mpMenu()"><span class="mi">👥</span><div class="mn">Multiplayer</div><div class="md">Live trivia · type to win</div></div>
    </div>`);
}

function statsScreen(){
  const pct=me.total>0?Math.round(me.correct/me.total*100):0;
  render(`
    <button class="back" onclick="homeScreen()">Back</button>
    <div style="text-align:center"><div class="av av-l" style="background:${me.av.b};margin:0 auto">${me.av.f}</div><div style="font-weight:800;font-size:1.2rem;margin-top:10px">${me.name}</div></div>
    <div class="sg">
      <div class="sb"><div class="sv" style="color:var(--pk)">${me.games}</div><div class="sl">Games</div></div>
      <div class="sb"><div class="sv" style="color:var(--yl)">${me.wins}</div><div class="sl">Wins</div></div>
      <div class="sb"><div class="sv" style="color:var(--cy)">${pct}%</div><div class="sl">Accuracy</div></div>
      <div class="sb"><div class="sv" style="color:var(--bl)">${me.correct}</div><div class="sl">Correct</div></div>
    </div>
    <button class="btn btn-gh btn-s" onclick="me.games=0;me.wins=0;me.correct=0;me.total=0;saveMe();statsScreen()">Reset Stats</button>`);
}

/* ========== TRIVIA ========== */
let tCat='Mixed',tDiff='easy',tQs=[],tIdx=0,tSc=0,tStrk=0,tTimer=null,tTime=0;

function triviaSetup(){
  render(`
    <button class="back" onclick="homeScreen()">Back</button>
    <div class="cd">
      <div class="lbl">Category</div>
      <div class="chips">${CATS.map(c=>`<button class="chip ${c===tCat?'on':''}" onclick="tCat='${c}';triviaSetup()">${c}</button>`).join('')}</div>
    </div>
    <div class="cd">
      <div class="lbl">Difficulty</div>
      <div class="diffs">
        <button class="df ez ${tDiff==='easy'?'on':''}" onclick="tDiff='easy';triviaSetup()">Easy</button>
        <button class="df md ${tDiff==='medium'?'on':''}" onclick="tDiff='medium';triviaSetup()">Medium</button>
        <button class="df hd ${tDiff==='hard'?'on':''}" onclick="tDiff='hard';triviaSetup()">Hard</button>
      </div>
    </div>
    <div class="cd">
      <div class="lbl">Questions</div>
      <select class="sel" id="tNum"><option value="5">5</option><option value="10" selected>10</option><option value="15">15</option><option value="20">20</option></select>
    </div>
    <button class="btn btn-pk" id="tBtn" onclick="startTrivia()">Play ⚡</button>
    <div id="tSt"></div>`);
}

const TRIVIA_BANK=[
  {q:"What is the capital of France?",a:"paris",cat:"Geography"},
  {q:"What planet is known as the Red Planet?",a:"mars",cat:"Space"},
  {q:"What is the chemical symbol for gold?",a:"au",cat:"Science"},
  {q:"What is the largest ocean?",a:"pacific",cat:"Geography"},
  {q:"Who painted the Mona Lisa?",a:"da vinci",cat:"Art & Literature"},
  {q:"What is the capital of Japan?",a:"tokyo",cat:"Geography"},
  {q:"How many bones in an adult human body?",a:"206",cat:"Human Body"},
  {q:"What year did the Titanic sink?",a:"1912",cat:"History"},
  {q:"What is the smallest country in the world?",a:"vatican",cat:"Geography"},
  {q:"What is the hardest natural substance?",a:"diamond",cat:"Science"},
  {q:"What language is spoken in Brazil?",a:"portuguese",cat:"Languages"},
  {q:"What is the fastest land animal?",a:"cheetah",cat:"Animals"},
  {q:"What is the longest river in the world?",a:"nile",cat:"Geography"},
  {q:"What is the capital of Australia?",a:"canberra",cat:"Geography"},
  {q:"What is the boiling point of water in Celsius?",a:"100",cat:"Science"},
  {q:"Who wrote Romeo and Juliet?",a:"shakespeare",cat:"Art & Literature"},
  {q:"What is the currency of Japan?",a:"yen",cat:"Finance"},

async function startTrivia(){
  const btn=$('tBtn');btn.disabled=true;btn.textContent='LOADING...';
  const n=parseInt($('tNum').value);
  let qs;
  try{
    qs=await fetchTriviaAI(n,tCat,tDiff);
    if(!qs||!qs.length)throw 'x';
  }catch(e){
    let pool=tCat==='Mixed'?[...TRIVIA_BANK]:TRIVIA_BANK.filter(q=>q.cat.toLowerCase().includes(tCat.toLowerCase()));
    if(pool.length<3)pool=[...TRIVIA_BANK];
    qs=pool.sort(()=>Math.random()-.5).slice(0,Math.min(n,pool.length)).map(q=>({question:q.q,answer:q.a}));
  }
  tQs=qs;tIdx=0;tSc=0;tStrk=0;
  btn.disabled=false;btn.textContent='PLAY ⚡';
  showTriviaQ();
}

async function fetchTriviaAI(n,cat,diff){
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:3000,messages:[{role:'user',content:`Generate ${n} ${diff} trivia questions about ${cat}. Return ONLY a JSON array: [{"question":"Q","answer":"short answer"}]. Answers must be 1-3 words max. Factual, varied, fun.`}]})});
  if(!r.ok)throw 'api';const d=await r.json();
  return JSON.parse(d.content[0].text.replace(/```json|```/g,'').trim());
}

function showTriviaQ(){
  if(tIdx>=tQs.length){endTrivia();return;}
  const q=tQs[tIdx];
  tTime=tDiff==='easy'?20:tDiff==='medium'?15:10;
  render(`
    <div class="gbar">
      <div class="gbar-l"><span class="qnum">Q${tIdx+1}/${tQs.length}</span><span style="margin-left:8px;font-size:.65rem;color:var(--dm)">${tCat} · ${tDiff}</span></div>
      <div class="gbar-r">
        <div class="score-pill">⚡ ${tSc}${tStrk>=2?'<span class="streak-badge">🔥'+tStrk+'</span>':''}</div>
        <button class="gbtn" onclick="quitTrivia()">✕</button>
      </div>
    </div>
    <div class="tbar"><div class="tf tf-ok" id="tFill" style="width:100%"></div></div>
    <div class="qcard">
      <div class="qnum">QUESTION ${tIdx+1}</div>
      <div class="qtxt">${q.question}</div>
      <div class="ans-row">
        <input class="ans-inp" id="tAns" type="text" placeholder="Type your answer..." autofocus autocomplete="off" onkeydown="if(event.key==='Enter')submitTrivia()">
        <button class="ans-btn ans-pk" onclick="submitTrivia()">→</button>
      </div>
      <button class="skip-btn" onclick="skipTrivia()">Skip →</button>
    </div>
    <div id="tFb"></div>`);
  setTimeout(()=>{const i=$('tAns');if(i)i.focus();},100);
  startTriviaTimer();
}

function startTriviaTimer(){
  clearInterval(tTimer);
  const total=tTime;
  tTimer=setInterval(()=>{
    tTime--;
    const fill=$('tFill');
    if(fill){
      fill.style.width=(tTime/total*100)+'%';
      if(tTime<=5)fill.className='tf tf-warn';
    }
    if(tTime<=0){clearInterval(tTimer);timeUpTrivia();}
  },1000);
}

function submitTrivia(){
  clearInterval(tTimer);
  const q=tQs[tIdx];
  const ans=($('tAns')||{}).value||'';
  const correct=ans.trim().toLowerCase();
  const expected=q.answer.toLowerCase();
  // Fuzzy match: contains or is contained
  const ok=correct.length>1&&(expected.includes(correct)||correct.includes(expected)||correct===expected);
  if(ok){tSc++;tStrk++;me.correct++;}else{tStrk=0;}
  me.total++;saveMe();
  showTriviaFb(ok,q.answer);
}

function skipTrivia(){clearInterval(tTimer);tStrk=0;me.total++;saveMe();showTriviaFb(false,tQs[tIdx].answer);}
function timeUpTrivia(){tStrk=0;me.total++;saveMe();showTriviaFb(false,tQs[tIdx].answer);}

function showTriviaFb(ok,answer){
  const fb=$('tFb');
  if(fb)fb.innerHTML=`<div class="fb-wrap ${ok?'fb-ok':'fb-no'}"><div class="fb-icon">${ok?'✅':'❌'}</div><div class="fb-answer">${ok?'Correct!':'Answer: '+answer}</div></div>`;
  setTimeout(()=>{tIdx++;showTriviaQ();},1500);
}

function quitTrivia(){clearInterval(tTimer);me.games++;saveMe();endTriviaShow();}

function endTrivia(){me.games++;if(tSc>=tQs.length*.8)me.wins++;saveMe();endTriviaShow();}

function endTriviaShow(){
  clearInterval(tTimer);
  const pct=tQs.length>0?Math.round(tSc/tQs.length*100):0;
  let msg='Keep going!',icon='💪';if(pct>=90){msg='Genius!';icon='🧠';}else if(pct>=70){msg='Nice!';icon='⚡';}else if(pct>=50){msg='Decent!';icon='👍';}
  render(`<div class="res"><div class="res-i">${icon}</div><div class="res-t">${msg}</div><div class="res-sc">${tSc}/${tQs.length}</div><div class="res-sub">${pct}% · ${tCat} · ${tDiff}</div><div class="btn-r"><button class="btn btn-pk" onclick="triviaSetup()">Again</button><button class="btn btn-gh" onclick="homeScreen()">Home</button></div></div>`);
}

function showN10(){
  let stk='';for(let i=0;i<3;i++)stk+=`<div class="stk ${i<n10Wrong?'x':''}">${i<n10Wrong?'✕':''}</div>`;
  render(`

    </div>
    <div id="n10Fb"></div>`);
  // Restart timer display
  setTimeout(()=>{const i=$('n10I');if(i)i.focus();},50);
}

function subN10(){
  const inp=$('n10I');if(!inp)return;
  const v=inp.value.trim();if(!v)return;
  const vl=v.toLowerCase();
  
  // Check duplicate
  if(n10Ans.map(a=>a.toLowerCase()).includes(vl)){inp.value='';return;}
  
  // Validate against curated list (fuzzy)
  const isValid=n10Valid.some(valid=>valid.includes(vl)||vl.includes(valid));
  
  if(isValid){
    n10Ans.push(v);
    const cnt=$('n10L');if(cnt)cnt.innerHTML+=`<span class="n10-ok">${v}</span>`;
    const c=$('n10Fb');if(c)c.innerHTML='';
    inp.value='';
    const ct=document.querySelector('.n10-cnt');if(ct)ct.textContent=n10Ans.length+' / 10';
    if(n10Ans.length>=10){clearInterval(n10TI);endN10(true);}
  }else{
    n10Wrong++;
    const fb=$('n10Fb');if(fb)fb.innerHTML=`<div style="text-align:center;color:var(--rd);font-size:.8rem;padding:4px">❌ "${v}" doesn't count! ${3-n10Wrong} strike${3-n10Wrong!==1?'s':''} left</div>`;
    inp.value='';
    if(n10Wrong>=3){clearInterval(n10TI);endN10(false);}
    else{
      // Update strikes display
      const stks=document.querySelectorAll('.stk');
      stks.forEach((s,i)=>{if(i<n10Wrong){s.classList.add('x');s.textContent='✕';}});
    }
  }
}

async function endN10(win){
  clearInterval(n10TI);me.games++;me.correct+=n10Ans.length;me.total+=10;if(win)me.wins++;await saveMe();
  render(`<div class="res"><div class="res-i">${win?'🔥':'⏰'}</div><div class="res-t">${win?'Nailed it!':'${n10Wrong>=3?"3 Strikes!":"Time\'s up!"}'}</div><div style="font-size:.8rem;color:var(--tx2);margin-bottom:6px">${n10Cat}</div><div class="res-sc">${n10Ans.length}/10</div><div class="n10-list" style="margin:12px 0">${n10Ans.map(a=>`<span class="n10-ok">${a}</span>`).join('')}</div><div class="btn-r"><button class="btn btn-or" onclick="startN10()">Again</button><button class="btn btn-gh" onclick="homeScreen()">Home</button></div></div>`);

      <div style="font-size:2rem;margin-bottom:6px">👥</div>
      <div style="font-weight:800;font-size:1rem">MULTIPLAYER</div>
      <div style="font-size:.75rem;color:var(--tx2);margin-top:4px">Same device · Pass & play trivia</div>
    </div>
    <div class="btn-r">
      <button class="btn btn-pk" onclick="mpSetup()">Start Game</button>
    </div>`);
}

let mpPlayers=[],mpQs=[],mpIdx=0,mpCur=0,mpScores=[],mpTimer=null,mpTime=0;

function mpSetup(){
  render(`
    <button class="back" onclick="mpMenu()">Back</button>
    <div class="cd">
      <div class="lbl">Player Names (2-4)</div>
      <input class="inp" id="mp1" type="text" placeholder="Player 1" maxlength="12" style="margin-bottom:6px">
      <input class="inp" id="mp2" type="text" placeholder="Player 2" maxlength="12" style="margin-bottom:6px">
      <input class="inp" id="mp3" type="text" placeholder="Player 3 (optional)" maxlength="12" style="margin-bottom:6px">
      <input class="inp" id="mp4" type="text" placeholder="Player 4 (optional)" maxlength="12">
    </div>
    <div class="cd">
      <div class="lbl">Category</div>
      <select class="sel" id="mpCat"><option value="Mixed">Mixed</option>${CATS.slice(1).map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
      <div class="lbl" style="margin-top:10px">Questions</div>
      <select class="sel" id="mpNum"><option value="8">8</option><option value="12" selected>12</option><option value="16">16</option><option value="20">20</option></select>
    </div>
    <button class="btn btn-pk" id="mpBtn" onclick="startMP()">Start ⚡</button>`);
}

async function startMP(){
  mpPlayers=[];
  for(let i=1;i<=4;i++){const v=($('mp'+i)||{}).value;if(v&&v.trim())mpPlayers.push({name:v.trim(),av:rAv()});}
  if(mpPlayers.length<2)return;
  
  const btn=$('mpBtn');btn.disabled=true;btn.textContent='LOADING...';
  const n=parseInt($('mpNum').value),cat=$('mpCat').value;
  let qs;
  try{qs=await fetchTriviaAI(n,cat,'medium');if(!qs||!qs.length)throw 'x';}
  catch(e){let pool=cat==='Mixed'?[...TRIVIA_BANK]:TRIVIA_BANK.filter(q=>q.cat.toLowerCase().includes(cat.toLowerCase()));if(pool.length<3)pool=[...TRIVIA_BANK];qs=pool.sort(()=>Math.random()-.5).slice(0,Math.min(n,pool.length)).map(q=>({question:q.q,answer:q.a}));}
  
  mpQs=qs;mpIdx=0;mpCur=0;mpScores=new Array(mpPlayers.length).fill(0);
  btn.disabled=false;
  showMPQ();
}

function showMPQ(){
  if(mpIdx>=mpQs.length){endMP();return;}
  const q=mpQs[mpIdx],p=mpPlayers[mpCur];
  mpTime=15;
  const scs=mpPlayers.map((p,i)=>`<div class="sc ${i===mpCur?'on':''}" style="border-color:${['var(--pk)','var(--bl)','var(--yl)','var(--pr)'][i]}"><div class="sc-nm" style="color:${['var(--pk)','var(--bl)','var(--yl)','var(--pr)'][i]}">${p.name}</div><div class="sc-pt" style="color:${['var(--pk)','var(--bl)','var(--yl)','var(--pr)'][i]}">${mpScores[i]}</div></div>`).join('');
  
  render(`
    <div class="scs">${scs}</div>
    <div class="gbar"><span class="qnum">Q${mpIdx+1}/${mpQs.length}</span><button class="gbtn" onclick="clearInterval(mpTimer);homeScreen()">✕</button></div>
    <div class="tbar"><div class="tf tf-ok" id="mpF" style="width:100%"></div></div>
    <div class="qcard">
      <div style="font-size:.7rem;font-weight:700;color:${['var(--pk)','var(--bl)','var(--yl)','var(--pr)'][mpCur]};letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px">${p.name}'s Turn</div>
      <div class="qtxt">${q.question}</div>
      <div class="ans-row">
        <input class="ans-inp" id="mpAns" type="text" placeholder="Type answer..." autofocus onkeydown="if(event.key==='Enter')subMP()">
        <button class="ans-btn ans-pk" onclick="subMP()">→</button>
      </div>
      <button class="skip-btn" onclick="skipMP()">Skip →</button>
    </div>
    <div id="mpFb"></div>`);
  setTimeout(()=>{const i=$('mpAns');if(i)i.focus();},100);
  clearInterval(mpTimer);
  mpTimer=setInterval(()=>{mpTime--;const f=$('mpF');if(f){f.style.width=(mpTime/15*100)+'%';if(mpTime<=5)f.className='tf tf-warn';}if(mpTime<=0){clearInterval(mpTimer);skipMP();}},1000);
}

function subMP(){
  clearInterval(mpTimer);
  const q=mpQs[mpIdx],ans=($('mpAns')||{}).value||'';
  const ok=ans.trim().toLowerCase().length>1&&(q.answer.toLowerCase().includes(ans.trim().toLowerCase())||ans.trim().toLowerCase().includes(q.answer.toLowerCase()));
  if(ok)mpScores[mpCur]++;
  const fb=$('mpFb');
  if(fb)fb.innerHTML=`<div class="fb-wrap ${ok?'fb-ok':'fb-no'}"><div class="fb-icon">${ok?'✅':'❌'}</div><div class="fb-answer">${ok?'Correct!':'Answer: '+q.answer}</div></div>`;
  setTimeout(nextMP,1500);
}

function skipMP(){clearInterval(mpTimer);const fb=$('mpFb');if(fb)fb.innerHTML=`<div class="fb-wrap fb-no"><div class="fb-icon">⏭️</div><div class="fb-answer">Answer: ${mpQs[mpIdx].answer}</div></div>`;setTimeout(nextMP,1500);}

function nextMP(){mpCur=(mpCur+1)%mpPlayers.length;if(mpCur===0)mpIdx++;showMPQ();}

function endMP(){
  clearInterval(mpTimer);
  const sorted=mpPlayers.map((p,i)=>({...p,score:mpScores[i],i})).sort((a,b)=>b.score-a.score);
  const cols=['var(--pk)','var(--bl)','var(--yl)','var(--pr)'];
  render(`<div class="res"><div class="res-i">👑</div><div class="res-t" style="color:${cols[sorted[0].i]}">${sorted[0].name} wins!</div><div style="display:flex;flex-direction:column;gap:5px;margin:16px 0;text-align:left">${sorted.map((p,r)=>`<div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg2);border-radius:10px;border:1px solid var(--bd)"><span style="font-family:var(--fm);font-size:1rem;width:28px">${['🥇','🥈','🥉','4️⃣'][r]}</span><div class="av av-s" style="background:${p.av.b}">${p.av.f}</div><span style="font-weight:700;flex:1;color:${cols[p.i]}">${p.name}</span><span style="font-family:var(--fm);font-size:1.2rem;color:${cols[p.i]}">${p.score}</span></div>`).join('')}</div><div class="btn-r"><button class="btn btn-pk" onclick="mpSetup()">Again</button><button class="btn btn-gh" onclick="homeScreen()">Home</button></div></div>`);
}

/* ========== INIT ========== */
if(loadMe())homeScreen();else authScreen();
</script>
</body>
</html>
